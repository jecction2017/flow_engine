name: demo_flow
version: 1.0.0
strategies:
  default_sync:
    name: default_sync
    mode: sync
    concurrency: 4
    retry_count: 0
  async_io:
    name: async_io
    mode: async
    concurrency: 8
    timeout: 120.0
    retry_count: 0
  worker:
    name: worker
    mode: thread
    concurrency: 4
    timeout: 60.0
    retry_count: 0
nodes:
- type: loop
  name: loop_alarm
  strategy_ref: default_sync
  wait_before: false
  iterable: $.global.alarms
  alias: it
  children:
  - type: task
    name: normalization
    strategy_ref: default_sync
    wait_before: false
    script: "alarm = $.item\nalarm = {\n  \"alarm_id\": alarm.get(\"id\"),\n  \"alarm_grade\"\
      : alarm.get(\"activity_level\"),\n  \"alarm_type\": alarm.get(\"activity_feature\"\
      )\n}\nreturn {\"a\": alarm, \"b\": \"b\"}"
    boundary:
      inputs: {}
      outputs:
        a: $.global.al
        b: $.global.ald
  copy_item: shared
  iteration_isolation: shared
initial_context:
  alarms:
  - id: '2026040101'
    activity_level: low
    activity_feature: app_type_01
  - id: '2026040102'
    activity_level: medium
    activity_feature: app_type_01
  - id: '2026040103'
    activity_level: high
    activity_feature: app_type_01
  - id: '2026040104'
    activity_level: low
    activity_feature: app_type_02
